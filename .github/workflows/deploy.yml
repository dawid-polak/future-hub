name: Deploy production

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/domains/${{ secrets.DOMAIN }}/public_nodejs
            git fetch origin production
            git reset --hard origin/production
            npm install
            npm run build
            devil www restart ${{ secrets.DOMAIN }}
            echo "Deploy OK"
