name: Build desktop

on:
  push:
    tags: ['desktop-v*.*.*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build desktop renderer + main + preload
        run: npm run build -w @futurehub/desktop

      - name: Package macOS DMG
        if: matrix.os == 'macos-latest'
        run: npx --workspace=@futurehub/desktop electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Windows NSIS
        if: matrix.os == 'windows-latest'
        run: npx --workspace=@futurehub/desktop electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Linux AppImage + DEB
        if: matrix.os == 'ubuntu-latest'
        run: npx --workspace=@futurehub/desktop electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.exe
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/latest*.yml
            packages/desktop/release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml
            artifacts/**/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
